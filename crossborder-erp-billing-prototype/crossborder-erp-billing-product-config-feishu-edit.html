<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品维护 - 用户中心</title>
  <link rel="stylesheet" href="billing-erp-platform.css">
  <style>
    body { background:#f5f7fb; }
    .edit-page {
      padding: 18px 20px 92px;
      width: 100%;
      box-sizing: border-box;
    }
    .product-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .form-section {
      background: #fff;
      border: 1px solid #e5e8ef;
      border-radius: 6px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .03);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #eef1f5;
    }
    .section-head h2 {
      margin: 0;
      font-size: 15px;
      color: #1f2329;
      font-weight: 650;
    }
    .segment {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 16px 18px 0;
    }
    .segment button {
      border: 1px solid #d8dde8;
      background: #fff;
      color: #3f4754;
      border-radius: 5px;
      min-height: 40px;
      cursor: pointer;
      font-size: 13px;
    }
    .segment button.active {
      border-color: #3370ff;
      color: #1d4ed8;
      background: #eef4ff;
      font-weight: 600;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 18px;
      padding: 16px 18px 18px;
    }
    .form-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .field.full { grid-column: 1 / -1; }
    .field label {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
      color: #646a73;
      font-size: 12px;
    }
    .req { color: #ff4d4f; }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      height: 34px;
      border: 1px solid #d8dde8;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
      color: #1f2329;
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .field textarea {
      height: 64px;
      resize: vertical;
      line-height: 1.5;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #3370ff;
      box-shadow: 0 0 0 3px rgba(51, 112, 255, .10);
    }
    .system-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .system-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid #d8dde8;
      border-radius: 5px;
      background: #fbfcff;
      color: #1f2329;
      font-size: 13px;
      box-sizing: border-box;
    }
    .system-option input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #3370ff;
    }
    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 34px;
      color: #3f4754;
      font-size: 13px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #d9d9d9;
      border-radius: 999px;
      transition: background .15s;
    }
    .switch .slider::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform .15s;
    }
    .switch input:checked + .slider { background: #3370ff; }
    .switch input:checked + .slider::before { transform: translateX(16px); }
    .table-wrap {
      padding: 0 18px 14px;
      overflow-x: auto;
    }
    .rights-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 760px;
    }
    .rights-table th,
    .rights-table td {
      border-bottom: 1px solid #edf0f5;
      padding: 9px 10px;
      text-align: left;
      vertical-align: middle;
    }
    .rights-table th {
      color: #646a73;
      font-size: 12px;
      font-weight: 500;
      background: #fafbfc;
    }
    .rights-table td input,
    .rights-table td select {
      height: 30px;
      border: 1px solid #d8dde8;
      border-radius: 4px;
      padding: 4px 8px;
      width: 100%;
      font-size: 13px;
      box-sizing: border-box;
    }
    .amount-cell {
      display: grid;
      grid-template-columns: 88px minmax(110px, 1fr);
      gap: 8px;
      align-items: center;
    }
    .amount-cell.is-unlimited {
      grid-template-columns: 88px minmax(110px, 1fr);
    }
    .amount-cell.is-unlimited input {
      color: #3370ff;
      background: #f3f7ff;
      border-color: #d8e3ff;
      font-weight: 500;
    }
    .empty-row td {
      padding: 22px 12px;
      text-align: center;
      color: #86909c;
      background: #fafbfc;
    }
    .table-actions {
      padding: 10px 18px 16px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .picker-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
    }
    .picker-mask.open { display: block; }
    .picker {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      max-width: calc(100% - 32px);
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, .18);
      overflow: hidden;
    }
    .picker h3 {
      padding: 16px;
      border-bottom: 1px solid #edf0f5;
      margin: 0;
      font-size: 15px;
    }
    .picker-body {
      padding: 12px 16px;
      max-height: 360px;
      overflow-y: auto;
    }
    .picker-body label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 8px;
      border-bottom: 1px solid #f2f4f7;
      font-size: 13px;
      cursor: pointer;
    }
    .picker-body label:hover { background: #fafbfc; }
    .picker-body input { accent-color: #3370ff; }
    .picker-body .code {
      margin-left: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: #86909c;
    }
    .picker-foot {
      padding: 12px 16px;
      border-top: 1px solid #edf0f5;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .sticky-actions {
      position: fixed;
      left: var(--ly-side-width);
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, .96);
      border-top: 1px solid #e5e8ef;
      padding: 12px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 50;
      box-shadow: 0 -2px 8px rgba(15, 23, 42, .05);
      backdrop-filter: blur(10px);
    }
    .sticky-actions .meta {
      font-size: 12px;
      color: #86909c;
      margin-right: auto;
    }
    @media (max-width: 900px) {
      .form-grid,
      .form-grid.three,
      .system-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      body { --ly-side-width: 0px; }
      .ly-side { display: none; }
      .edit-page { padding: 12px 10px 92px; }
      .sticky-actions { left: 0; right: 0; padding: 10px 12px; overflow-x: auto; }
      .sticky-actions .meta { display: none; }
      .sticky-actions .ly-btn { white-space: nowrap; }
    }
  </style>
</head>
<body>
<div class="ly-app">
  <aside class="ly-side">
    <div class="ly-side-logo"><span class="logo-mark">凌</span> 用户中心</div>
    <nav class="ly-nav">
      <div class="ly-nav-group"><span class="ly-nav-item"><span class="ico">▸</span> 组织架构</span></div>
      <div class="ly-nav-group">
        <span class="ly-nav-item"><span class="ico">▾</span> 租户管理</span>
        <div class="ly-nav-sub"><a href="crossborder-erp-billing-tenant-config-real.html">租户配置</a></div>
      </div>
      <div class="ly-nav-group">
        <span class="ly-nav-item"><span class="ico">▾</span> 客户管理</span>
        <div class="ly-nav-sub"><a href="crossborder-erp-billing-customer-management-feishu.html">客户配置</a></div>
      </div>
      <div class="ly-nav-group">
        <span class="ly-nav-item active"><span class="ico">▾</span> 计费管理</span>
        <div class="ly-nav-sub">
          <a href="crossborder-erp-billing-product-config-feishu.html" class="active">商品配置</a>
          <a href="crossborder-erp-billing-product-config-dictionary.html">字典维护</a>
          <a href="crossborder-erp-billing-order-management-feishu.html">订单管理</a>
        </div>
      </div>
      <div class="ly-nav-group"><span class="ly-nav-item"><span class="ico">▸</span> 授权设置</span></div>
      <div class="ly-nav-group"><span class="ly-nav-item"><span class="ico">▸</span> 个人中心</span></div>
    </nav>
    <div class="ly-side-foot">收起导航</div>
  </aside>

  <div class="ly-wrap">
    <header class="ly-topbar">
      <div class="ly-tabs">
        <a class="ly-tab" href="crossborder-erp-billing-product-config-feishu.html">商品配置 <span class="close">×</span></a>
        <a class="ly-tab active" href="#">商品维护 <span class="close">×</span></a>
      </div>
      <div class="ly-topbar-right">
        <span>🔍</span><span>🔔</span>
        <span class="user"><span class="avatar">胡</span> 胡仕玲</span>
      </div>
    </header>

    <main class="ly-main edit-page">
      <div class="product-form">
        <section class="form-section">
          <div class="section-head"><h2>① 商品信息</h2></div>
          <div class="segment" id="typeSegment">
            <button type="button" class="active" data-type="MAIN">主套餐</button>
            <button type="button" data-type="ADDON">增值服务</button>
          </div>
          <div class="form-grid">
            <div class="field">
              <label>商品编码 <span class="req">*</span></label>
              <input id="skuCode" value="" placeholder="自动生成，可手动修改">
            </div>
            <div class="field">
              <label>商品名称 <span class="req">*</span></label>
              <input id="productName" value="" placeholder="如 ERP 旗舰版">
            </div>
            <div class="field full">
              <label>适用系统 <span class="req">*</span></label>
              <div class="system-grid">
                <label class="system-option"><input type="checkbox" data-system="ERP" checked> ERP</label>
                <label class="system-option"><input type="checkbox" data-system="SCM"> SCM</label>
                <label class="system-option"><input type="checkbox" data-system="WMS"> WMS</label>
              </div>
            </div>
            <div class="field full">
              <label>备注</label>
              <textarea id="remark" placeholder="合同、商务口径、特殊说明，仅平台内部可见"></textarea>
            </div>
            <div class="field full">
              <label class="toggle-row">
                <span class="switch"><input id="tenantVisible" type="checkbox" checked><span class="slider"></span></span>
                <span>租户可见</span>
              </label>
            </div>
          </div>
        </section>

        <section class="form-section">
          <div class="section-head"><h2>② 价格与权益</h2></div>
          <div class="form-grid three">
            <div class="field">
              <label>计价模式 <span class="req">*</span></label>
              <select id="priceMode" onchange="syncPriceUnit()">
                <option>按年订阅</option>
                <option>一次性</option>
                <option>按量计费</option>
                <option>线下报价</option>
              </select>
            </div>
            <div class="field">
              <label>销售价格</label>
              <input id="salePrice" placeholder="如 ¥69,800">
            </div>
            <div class="field">
              <label>单位</label>
              <input id="priceUnit" value="年" placeholder="如 年、包、单、次">
            </div>
          </div>
          <div class="table-wrap">
            <table class="rights-table">
              <thead>
                <tr>
                  <th style="width:26%">权益项</th>
                  <th style="width:30%">额度</th>
                  <th style="width:16%">单位</th>
                  <th>类型</th>
                  <th style="width:80px">操作</th>
                </tr>
              </thead>
              <tbody id="rightsBody"></tbody>
            </table>
          </div>
          <div class="table-actions">
            <a class="ly-link" href="#" onclick="openPicker();return false">+ 添加权益项</a>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>

<div class="picker-mask" id="pickerMask" onclick="if(event.target===this)closePicker()">
  <div class="picker">
    <h3>从字典选择权益项</h3>
    <div class="picker-body" id="pickerBody"></div>
    <div class="picker-foot">
      <button type="button" class="ly-btn" onclick="closePicker()">取消</button>
      <button type="button" class="ly-btn ly-btn-primary" onclick="confirmPicker()">添加所选</button>
    </div>
  </div>
</div>

<div class="sticky-actions">
  <span class="meta">改动会先保存为草稿；发布后租户立即可见。</span>
  <button type="button" class="ly-btn" onclick="location.href='crossborder-erp-billing-product-config-feishu.html'">取消</button>
  <button type="button" class="ly-btn" onclick="alert('已保存草稿')">保存草稿</button>
  <button type="button" class="ly-btn ly-btn-primary" onclick="confirmPublish()">保存并发布</button>
</div>

<script>
var RIGHTS_LIB = [
  { code: 'QUOTA_ORDER_QTY', name: '年订单量', unit: '单/年', type: '主套餐配额' },
  { code: 'QUOTA_MSKU', name: 'MSKU 额度', unit: '个', type: '主套餐配额' },
  { code: 'QUOTA_SHOP', name: '店铺 / 站点', unit: '个', type: '主套餐配额' },
  { code: 'QUOTA_SUB_USER', name: '子账号', unit: '个', type: '主套餐配额' },
  { code: 'QUOTA_PLATFORM', name: '平台授权', unit: '个', type: '主套餐配额' },
  { code: 'QUOTA_TRACK', name: '物流轨迹查询', unit: '单', type: '按量权益' },
  { code: 'SVC_KDCS', name: '金蝶云星空对接', unit: '次', type: '服务项' },
  { code: 'SVC_TRAINING', name: '线下实施培训', unit: '人天', type: '服务项' }
];

var rightsRows = [];

function pad(n) { return String(n).padStart(2, '0'); }
function createSkuCode() {
  var now = new Date();
  return 'SKU_AUTO_' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + '_001';
}
function getRightDef(code) {
  return RIGHTS_LIB.find(function(item) { return item.code === code; }) || {};
}
function renderRights() {
  var body = document.getElementById('rightsBody');
  body.innerHTML = '';
  if (!rightsRows.length) {
    var empty = document.createElement('tr');
    empty.className = 'empty-row';
    empty.innerHTML = '<td colspan="5">暂无权益项</td>';
    body.appendChild(empty);
    return;
  }
  rightsRows.forEach(function(row, index) {
    var def = getRightDef(row.code);
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (def.name || row.code) + '</td>' +
      '<td><div class="amount-cell ' + (row.unlimited ? 'is-unlimited' : '') + '">' +
        '<select onchange="setUnlimited(' + index + ', this.value === &quot;unlimited&quot;)">' +
          '<option value="limited" ' + (!row.unlimited ? 'selected' : '') + '>限额</option>' +
          '<option value="unlimited" ' + (row.unlimited ? 'selected' : '') + '>不限</option>' +
        '</select>' +
        '<input ' + (row.unlimited ? 'disabled' : 'type="number"') + ' value="' + (row.unlimited ? '不限' : row.value) + '" onchange="rightsRows[' + index + '].value=this.value">' +
      '</div></td>' +
      '<td>' + (row.unit || def.unit || '') + '</td>' +
      '<td>' + (row.type || def.type || '') + '</td>' +
      '<td><a class="ly-link" href="#" onclick="removeRight(' + index + ');return false">删除</a></td>';
    body.appendChild(tr);
  });
}
function setUnlimited(index, value) {
  rightsRows[index].unlimited = value;
  renderRights();
}
function removeRight(index) {
  rightsRows.splice(index, 1);
  renderRights();
}
function openPicker() {
  var used = rightsRows.map(function(row) { return row.code; });
  var body = document.getElementById('pickerBody');
  body.innerHTML = '';
  RIGHTS_LIB.forEach(function(item) {
    var disabled = used.indexOf(item.code) >= 0;
    var label = document.createElement('label');
    label.innerHTML =
      '<input type="checkbox" value="' + item.code + '" ' + (disabled ? 'disabled' : '') + '>' +
      '<span>' + item.name + (disabled ? '（已选）' : '') + '</span>' +
      '<span class="code">' + item.code + ' · ' + item.unit + '</span>';
    body.appendChild(label);
  });
  document.getElementById('pickerMask').classList.add('open');
}
function closePicker() {
  document.getElementById('pickerMask').classList.remove('open');
}
function confirmPicker() {
  document.querySelectorAll('#pickerBody input[type=checkbox]:checked:not(:disabled)').forEach(function(input) {
    var def = getRightDef(input.value);
    rightsRows.push({
      code: def.code,
      value: 0,
      unit: def.unit,
      type: def.type,
      unlimited: false
    });
  });
  renderRights();
  closePicker();
}
function syncPriceUnit() {
  var mode = document.getElementById('priceMode').value;
  var unit = document.getElementById('priceUnit');
  if (mode === '按年订阅') unit.value = '年';
  if (mode === '一次性') unit.value = '次';
  if (mode === '按量计费') unit.value = '单';
  if (mode === '线下报价') unit.value = '';
}
function applyType(type) {
  document.querySelectorAll('#typeSegment button').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-type') === type);
  });
  var priceMode = document.getElementById('priceMode');
  var unit = document.getElementById('priceUnit');
  if (type === 'MAIN') {
    priceMode.value = '按年订阅';
    unit.value = '年';
    document.querySelectorAll('.system-option input').forEach(function(input) {
      input.checked = input.getAttribute('data-system') === 'ERP';
    });
  } else {
    priceMode.value = '按年订阅';
    unit.value = '包';
  }
}
function confirmPublish() {
  if (confirm('确认保存并发布？')) alert('已保存并发布');
}
function initPage() {
  var params = new URLSearchParams(location.search);
  document.getElementById('skuCode').value = params.get('mode') === 'new' ? createSkuCode() : 'SKU_ERP_FLAGSHIP_001';
  if (params.get('mode') !== 'new') {
    document.getElementById('productName').value = 'ERP 旗舰版';
    document.getElementById('salePrice').value = '¥69,800';
    rightsRows = [
      { code: 'QUOTA_ORDER_QTY', value: 3000000, unit: '单/年', type: '主套餐配额', unlimited: false },
      { code: 'QUOTA_MSKU', value: 100000, unit: '个', type: '主套餐配额', unlimited: false },
      { code: 'QUOTA_PLATFORM', value: 0, unit: '个', type: '主套餐配额', unlimited: true }
    ];
  }
  document.querySelectorAll('#typeSegment button').forEach(function(btn) {
    btn.addEventListener('click', function() { applyType(btn.getAttribute('data-type')); });
  });
  renderRights();
}
initPage();
</script>
</body>
</html>
