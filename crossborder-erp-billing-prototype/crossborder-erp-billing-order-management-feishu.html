<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 用户中心</title>
  <link rel="stylesheet" href="billing-erp-platform.css">
  <style>
    body.order-management-page .ly-main {
      padding: 18px 20px 28px;
      background: #f6f7fb;
    }
    body.order-management-page .ly-card {
      border-color: #e9edf5;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(31, 35, 41, .035);
      overflow: hidden;
    }
    .list-head {
      padding: 16px;
      border-bottom: 1px solid var(--ly-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .list-head h2 { margin: 0; font-size: 16px; font-weight: 600; color: var(--ly-text); }
    .list-head .sub { color: var(--ly-muted); font-size: 12px; margin-top: 3px; }
    .list-head .actions { margin-left: auto; display: flex; gap: 8px; }
    body.order-management-page .ly-filter {
      align-items: flex-end;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #eef1f5;
      background: #fff;
    }
    body.order-management-page .ly-field {
      gap: 8px;
    }
    body.order-management-page .ly-field label {
      color: #86909c;
      font-size: 13px;
      font-weight: 500;
    }
    .search-field-group {
      display: inline-flex;
      align-items: center;
      height: 34px;
      border: 1px solid #dfe3eb;
      border-radius: 4px;
      background: #fff;
      overflow: hidden;
    }
    .search-field-group select {
      width: 94px;
      height: 32px;
      border: 0;
      border-right: 1px solid #edf0f5;
      border-radius: 0;
      background: #fbfcfe;
    }
    .search-field-group input {
      width: 220px;
      height: 32px;
      border: 0;
      border-radius: 0;
    }
    .search-field-group select:focus,
    .search-field-group input:focus {
      box-shadow: none;
    }
    .order-filter-actions {
      margin-left: auto;
      display: inline-flex;
      align-items: flex-end;
      gap: 10px;
    }
    .order-filter-actions .ly-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 34px;
      line-height: 1;
    }
    /* 表格内容描述（多订单项摘要） */
    .order-content { line-height: 1.5; }
    .order-content .extra { font-size: 12px; color: var(--ly-muted); }
    .order-content .item-count {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      margin-left: 6px;
      border-radius: 9px;
      background: #eef4ff;
      color: #2f6bff;
      font-size: 12px;
      line-height: 18px;
      vertical-align: 1px;
      position: relative;
      cursor: default;
    }
    .order-content .item-count:hover .order-items-popover {
      display: block;
    }
    .order-items-popover {
      display: none;
      position: absolute;
      z-index: 20;
      left: 0;
      top: 24px;
      min-width: 220px;
      max-width: 320px;
      padding: 10px 12px;
      border: 1px solid #dbe3ef;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      color: var(--ly-text);
      font-size: 12px;
      line-height: 1.7;
      white-space: normal;
    }
    .cell-sub { display: block; margin-top: 3px; color: var(--ly-muted); font-size: 12px; line-height: 1.4; }
    .money-cell { text-align: right; font-weight: 600; white-space: nowrap; }
    .link-muted { color: var(--ly-muted); }
    body.order-management-page .ly-table-wrap {
      border: 0;
      overflow-x: auto;
    }
    body.order-management-page .ly-table-wrap > table {
      min-width: 1180px;
      table-layout: fixed;
    }
    body.order-management-page .ly-table-wrap > table th,
    body.order-management-page .ly-table-wrap > table td {
      padding: 13px 12px;
      border-bottom: 1px solid #f0f2f6;
      vertical-align: middle;
      line-height: 1.45;
    }
    body.order-management-page .ly-table-wrap > table th {
      background: #fbfcfe;
      color: #697386;
      font-size: 12px;
      font-weight: 600;
      box-shadow: inset 0 -1px 0 #edf1f7;
    }
    body.order-management-page .ly-table-wrap > table tbody tr:hover td {
      background: #f8fbff;
    }
    .order-code {
      white-space: nowrap;
      font-family: var(--ly-font-num);
    }
    .order-ops {
      white-space: nowrap;
    }
    .order-date {
      white-space: nowrap;
      color: #4e5969;
    }
    .exception-tag {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      margin-top: 4px;
      border-radius: 999px;
      background: #fff7e6;
      color: #d46b08;
      border: 1px solid #ffd591;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }
    .exception-notice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 0 0 12px;
      padding: 10px 12px;
      border: 1px solid #ffd591;
      border-radius: 6px;
      background: #fffaf0;
      color: #7a4b00;
      font-size: 13px;
      line-height: 1.6;
    }
    .exception-notice strong {
      color: #ad6800;
      font-weight: 600;
    }

    /* 抽屉内部块 */
    .ly-drawer.wide { width: 720px; max-width: 90vw; }
    .drawer-block { padding: 14px 16px; border-bottom: 1px solid var(--ly-border); }
    .drawer-block:last-child { border-bottom: none; }
    .drawer-block h4 { margin: 0 0 10px; font-size: 13px; color: var(--ly-muted); font-weight: 500; }
    .drawer-meta {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 24px;
      font-size: 13px; line-height: 1.7;
    }
    .drawer-meta .k { color: var(--ly-muted); margin-right: 8px; }
    .drawer-meta .v { color: var(--ly-text); }

    /* 订单项表 */
    .item-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .item-table th, .item-table td {
      border: 1px solid var(--ly-border); padding: 8px 10px; text-align: left;
    }
    .item-table th { background: var(--ly-table-head); font-weight: 500; }
    .item-table .num { text-align: right; }
    .item-table tfoot td { background: #fafafa; font-weight: 500; }

    /* 附件行 */
    .att-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 13px; }
    .att-row .att-item { display: flex; align-items: center; gap: 8px; }
    .att-row .att-empty { color: var(--ly-muted); }

    /* 权益快照行 */
    .snap-list { font-size: 13px; line-height: 1.8; }
    .snap-list .item { display: flex; gap: 10px; }
    .snap-list .item .k { color: var(--ly-muted); min-width: 90px; flex-shrink: 0; }

    /* 操作日志时间线 */
    .timeline { list-style: none; padding: 0; margin: 0; }
    .timeline li {
      position: relative; padding: 6px 0 6px 22px;
      font-size: 13px; line-height: 1.6;
    }
    .timeline li::before {
      content: ""; position: absolute; left: 4px; top: 12px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff; border: 2px solid var(--ly-border);
    }
    .timeline li:first-child::before { background: var(--ly-primary); border-color: var(--ly-primary); }
    .timeline li::after {
      content: ""; position: absolute; left: 7px; top: 22px; bottom: -6px;
      width: 1px; background: var(--ly-border);
    }
    .timeline li:last-child::after { display: none; }
    .timeline .time { color: var(--ly-muted); font-size: 12px; margin-left: 8px; }

    /* 抽屉底部固定操作栏 */
    .drawer-actions {
      position: sticky; bottom: 0;
      background: #fff; border-top: 1px solid var(--ly-border);
      padding: 12px 16px;
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .order-detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--ly-border);
      margin-bottom: 14px;
    }
    .order-detail-head h3 { margin: 0; }
    .order-detail-close {
      border: 0;
      background: transparent;
      color: var(--ly-muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }
    .order-detail-body {
      flex: 1;
      overflow: auto;
      padding-right: 4px;
    }
    .order-detail-section {
      padding: 14px 0;
      border-bottom: 1px solid var(--ly-border);
    }
    .order-detail-section h4 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ly-muted);
    }
    .order-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 32px;
      font-size: 13px;
    }
    .order-info-grid .item {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      min-height: 24px;
      align-items: center;
    }
    .order-info-grid .label { color: var(--ly-muted); }
    .order-info-grid .value { color: var(--ly-text); }
    .create-control {
      width: 100%;
      height: 32px;
      border: 1px solid #d7dde8;
      border-radius: 4px;
      padding: 0 10px;
      background: #fff;
      color: var(--ly-text);
      font-size: 13px;
      box-sizing: border-box;
    }
    .create-control:focus {
      outline: 0;
      border-color: var(--ly-primary);
      box-shadow: 0 0 0 2px rgba(47, 107, 255, .08);
    }
    .create-control:disabled {
      color: var(--ly-muted);
      background: #f7f9fc;
      cursor: not-allowed;
    }
    .create-control.money {
      text-align: right;
      font-family: var(--ly-font-num);
      font-weight: 600;
    }
    .create-readonly {
      color: var(--ly-muted);
      background: #f7f9fc;
    }
    .create-period-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--ly-primary);
      font-size: 12px;
      font-weight: 500;
    }
    .create-rule-tip {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #c8d8ff;
      border-radius: 6px;
      background: #f5f8ff;
      color: #38507a;
      font-size: 12px;
      line-height: 1.6;
    }
    .create-rule-tip strong {
      color: var(--ly-primary);
      font-weight: 600;
    }
    .create-amount-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .create-amount-card {
      border: 1px solid #e5e9f2;
      border-radius: 6px;
      background: #fbfcff;
      padding: 12px 14px;
    }
    .create-amount-card .label {
      color: var(--ly-muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .create-amount-card .value {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--ly-font-num);
    }
    @media (max-width: 720px) {
      .create-amount-row {
        grid-template-columns: 1fr;
      }
    }
    .order-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .order-detail-table th,
    .order-detail-table td {
      border: 1px solid var(--ly-border);
      padding: 8px 10px;
      text-align: left;
      vertical-align: middle;
    }
    .order-detail-table th {
      background: var(--ly-table-head);
      font-weight: 500;
    }
    .order-detail-table .num { text-align: right; }
    .order-detail-table tfoot td {
      background: #fbfcff;
      font-weight: 600;
    }
    .order-detail-table .row-action {
      width: 72px;
      text-align: center;
      white-space: nowrap;
    }
    .entitlement-result-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .entitlement-result-item {
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #edf1f7;
      border-radius: 6px;
      background: #fbfcff;
      font-size: 13px;
    }
    .entitlement-result-item .name {
      font-weight: 600;
      color: var(--ly-text);
    }
    .entitlement-result-item .result {
      color: var(--ly-muted);
      line-height: 1.5;
    }
    .create-table-actions {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--ly-muted);
      font-size: 12px;
    }
    .attachment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--ly-border);
      border-radius: 4px;
      background: #fff;
      color: var(--ly-text);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }
    .attachment-chip:hover {
      color: var(--ly-primary);
      border-color: var(--ly-primary);
      background: #f0f7ff;
    }
    .attachment-chip.uploaded {
      border-color: #b7eb8f;
      background: #f6ffed;
      color: #237804;
    }
    .attachment-chip .file-icon {
      width: 22px;
      height: 26px;
      border: 1px solid #91caff;
      border-radius: 3px;
      background: #e6f4ff;
      position: relative;
      flex: 0 0 auto;
    }
    .attachment-chip .file-icon::after {
      content: "";
      position: absolute;
      right: -1px;
      top: -1px;
      border-left: 7px solid transparent;
      border-bottom: 7px solid #91caff;
    }
    .attachment-empty {
      color: var(--ly-muted);
      font-size: 13px;
      line-height: 34px;
    }
    .order-detail-foot {
      padding-top: 14px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--ly-border);
      margin-top: 12px;
    }
  </style>
</head>
<body class="order-management-page">
<div class="ly-app">
  <aside class="ly-side">
    <div class="ly-side-logo"><span class="logo-mark">凌</span> 用户中心</div>
    <nav class="ly-nav">
      <div class="ly-nav-group">
        <span class="ly-nav-item"><span class="ico">▸</span> 组织架构</span>
      </div>
      <div class="ly-nav-group">
        <span class="ly-nav-item"><span class="ico">▾</span> 租户管理</span>
        <div class="ly-nav-sub">
          <a href="crossborder-erp-billing-tenant-config-real.html">租户配置</a>
        </div>
      </div>
      <div class="ly-nav-group">
        <span class="ly-nav-item active"><span class="ico">▾</span> 计费管理</span>
        <div class="ly-nav-sub">
          <a href="crossborder-erp-billing-product-config-feishu.html">商品配置</a>
          <a href="crossborder-erp-billing-product-config-dictionary.html">字典维护</a>
          <a href="crossborder-erp-billing-order-management-feishu.html" class="active">订单管理</a>
        </div>
      </div>
      <div class="ly-nav-group"><span class="ly-nav-item"><span class="ico">▸</span> 授权设置</span></div>
      <div class="ly-nav-group"><span class="ly-nav-item"><span class="ico">▸</span> 个人中心</span></div>
    </nav>
    <div class="ly-side-foot">收起导航</div>
  </aside>

  <div class="ly-wrap">
    <header class="ly-topbar">
      <div class="ly-tabs">
        <a class="ly-tab active" href="#">订单管理 <span class="close">×</span></a>
      </div>
      <div class="ly-topbar-right">
        <span>🔍</span><span>🔔</span>
        <span class="user"><span class="avatar">胡</span> 胡仕玲</span>
      </div>
    </header>

    <main class="ly-main">
      <div class="ly-card" style="padding:0">
        <!-- 筛选条 -->
        <div class="ly-filter">
          <div class="ly-field">
            <div class="search-field-group">
              <select id="fSearchType">
                <option value="code" selected>订单编号</option>
                <option value="tenant">租户</option>
                <option value="product">商品名称</option>
              </select>
              <input type="text" id="fKeyword" placeholder="输入后回车搜索" onkeydown="if(event.key==='Enter')applyFilter()">
            </div>
          </div>
          <div class="ly-field">
            <label>订单类型</label>
            <select id="fType">
              <option value="" selected></option>
              <option>新购</option>
              <option>续费</option>
              <option>升级</option>
              <option>扩容</option>
              <option>试用</option>
            </select>
          </div>
          <div class="ly-field">
            <label>订单状态</label>
            <select id="fStatus">
              <option value="" selected></option>
              <option>草稿</option>
              <option>已开通</option>
              <option>已到期</option>
              <option>已作废</option>
            </select>
          </div>
          <div class="ly-field">
            <label>水单</label>
            <select id="fSlip">
              <option value="" selected></option>
              <option value="missing">未上传</option>
              <option value="uploaded">已上传</option>
            </select>
          </div>
          <div class="ly-field">
            <label>合同</label>
            <select id="fContract">
              <option value="" selected></option>
              <option value="missing">未上传</option>
              <option value="uploaded">已上传</option>
            </select>
          </div>
          <div class="ly-field">
            <label>异常</label>
            <select id="fException">
              <option value="" selected></option>
              <option value="has">有异常</option>
              <option value="none">无异常</option>
            </select>
          </div>
          <div class="ly-field">
            <label>创建时间</label>
            <input type="date" value="2026-06-01" style="height:32px">
            <span>~</span>
            <input type="date" value="2026-06-30" style="height:32px">
          </div>
          <button class="ly-btn ly-btn-primary" onclick="applyFilter()">查询</button>
          <button class="ly-btn" onclick="resetFilter()">重置</button>
          <div class="order-filter-actions">
            <button class="ly-btn ly-btn-primary" onclick="openCreate()">创建订单</button>
            <button class="ly-btn" onclick="alert('原型占位：导出当前筛选结果')">导出</button>
          </div>
        </div>

        <!-- 订单表 -->
        <div class="ly-table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:128px">订单编号</th>
                <th style="width:124px">租户</th>
                <th style="width:170px">商品信息</th>
                <th style="width:88px;white-space:nowrap">订单类型</th>
                <th style="width:92px;text-align:right">金额</th>
                <th style="width:96px">生效时间</th>
                <th style="width:98px">到期时间</th>
                <th style="width:106px">状态</th>
                <th style="width:90px">附件</th>
                <th style="width:72px">创建者</th>
                <th style="width:118px">创建时间</th>
                <th style="width:96px">操作</th>
              </tr>
            </thead>
            <tbody id="orderBody">
              <!-- JS 渲染 -->
            </tbody>
          </table>
        </div>
        <div class="ly-pagination">
          <span id="totalText">共 8 条</span>
          <div class="pages"><span class="page active">1</span></div>
          <select><option>20 条/页</option></select>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- 订单详情抽屉 -->
<div class="ly-drawer-mask" id="drawerMask" onclick="if(event.target===this)closeDrawer()">
  <aside class="ly-drawer" onclick="event.stopPropagation()" style="width:760px">
    <div class="order-detail-head">
      <h3><span id="dTitle">订单详情</span> <span id="dStatus" class="ly-status">已开通</span></h3>
      <button type="button" class="order-detail-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="order-detail-body" id="dBody"></div>
    <div class="order-detail-foot" id="dActions"></div>
  </aside>
</div>

<script>
/* ===== 数据：8 条订单 mock ===== */
var ORDERS = [
  {
    code: 'PO-20260518004', customer: '杭州星河跨境', type: '续费',
    period: '1年',
    items: [
      { name: 'ERP 旗舰版', qty: 1, price: 69800, unit: '年', period: '1年', subtotal: 69800, result: '延长主套餐与系统授权，有效期至 2027-12-31' },
      { name: '订单扩容包', qty: 2, price: 1000, unit: '包', period: '至 2027-12-31', subtotal: 2000, result: '年订单量增加 20 万，计入当前权益池' },
      { name: '物流轨迹查询', qty: 1, price: 5000, unit: '服务', period: '至 2027-12-31', subtotal: 5000, result: '开通服务权限，后续按业务系统上报消耗' }
    ],
    standardAmount: 76800, amount: 76800, status: '草稿', noSlip: true,
    createdAt: '2026-05-18 10:23', createdBy: '胡仕玲',
    openedAt: null, openedBy: null,

/* ===== 状态徽标 ===== */
function statusBadge(s) {
  if (s === '草稿')     return '<span class="ly-status warn">草稿</span>';
  if (s === '已开通')   return '<span class="ly-status">已开通</span>';
  if (s === '已到期')   return '<span class="ly-status muted">已到期</span>';
  if (s === '已作废')   return '<span class="ly-status muted">已作废</span>';
  return s;
}
function exceptionBadge(o) {
  return o.exception ? '<span class="exception-tag">' + o.exception + '</span>' : '';
}
function statusWithException(o) {
  return statusBadge(o.status) + exceptionBadge(o);
}
function retryText(exception) {
  return '重试';
}
function exceptionNotice(o) {
  if (!o.exception) return '';
  var text = '当前订单存在' + o.exception + '，租户侧暂未完全生效。平台人员可在订单列表执行' + retryText(o.exception) + '。';
  if (o.exception === '回收异常') text = '当前订单存在回收异常，回收完成前相关权益不得继续放行新增消耗。平台人员可在订单列表执行重试。';
  return '<div class="exception-notice"><span>!</span><div><strong>异常提示：</strong>' + text + '</div></div>';
}

function orderMatchesForm(o) {
  var keyword = (document.getElementById('fKeyword').value || '').trim().toLowerCase();
  var searchType = document.getElementById('fSearchType').value;
  var type = document.getElementById('fType').value;
  var status = document.getElementById('fStatus').value;
  var slip = document.getElementById('fSlip').value;
  var contract = document.getElementById('fContract').value;
  var exception = document.getElementById('fException').value;
  var content = o.items.map(function (it) { return it.name; }).join(' ');
  var haystack = content;
  if (searchType === 'code') haystack = o.code;
  if (searchType === 'tenant') haystack = o.customer;
  if (searchType === 'product') haystack = content;
  haystack = String(haystack || '').toLowerCase();
  if (keyword && haystack.indexOf(keyword) === -1) return false;
  if (type && o.type !== type) return false;
  if (status && o.status !== status) return false;
  if (slip === 'missing' && !!o.slip) return false;
  if (slip === 'uploaded' && !o.slip) return false;
  if (contract === 'missing' && !!o.contract) return false;
  if (contract === 'uploaded' && !o.contract) return false;
  if (exception === 'has' && !o.exception) return false;
  if (exception === 'none' && o.exception) return false;
  return true;
}

/* ===== 渲染列表 ===== */
function render() {
  var tbody = document.getElementById('orderBody');
  tbody.innerHTML = '';
  var list = ORDERS.map(function (o, idx) { return { order: o, idx: idx }; }).filter(function (entry) {
    return orderMatchesForm(entry.order);
  });
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:32px;color:var(--ly-muted)">无符合条件的订单</td></tr>';
    document.getElementById('totalText').textContent = '共 0 条';
    return;
  }
  list.forEach(function (entry) {
    var o = entry.order;
    var idx = entry.idx;
    var content = orderContentSummary(o);
    var ops = buildOps(o, idx);
    var amountStr = o.amount === 0 ? '¥0' : '¥' + o.amount.toLocaleString();
    var attachments = attachmentSummary(o);
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><a class="ly-link order-code" href="#" onclick="openDrawer(' + idx + ');return false">' + o.code + '</a></td>' +
      '<td>' + o.customer + '</td>' +
      '<td class="order-content">' + content + '</td>' +
      '<td>' + o.type + '</td>' +
      '<td class="money-cell">' + amountStr + '</td>' +
      '<td class="order-date">' + (o.startAt || '—') + '</td>' +
      '<td class="order-date">' + (o.endAt || '—') + (o.expiring ? '<span class="cell-sub" style="color:#d46b08">30 天内到期</span>' : '') + '</td>' +
      '<td>' + statusWithException(o) + '</td>' +
      '<td>' + attachments + '</td>' +
      '<td>' + o.createdBy + '</td>' +
      '<td class="order-date">' + o.createdAt + '</td>' +
      '<td class="order-ops">' + ops + '</td>';
    tbody.appendChild(tr);
  });
  document.getElementById('totalText').textContent = '共 ' + list.length + ' 条';
}

function attachmentSummary(o) {
  var files = [];
  if (o.slip) files.push("<a class=\"ly-link\" href=\"#\" onclick=\"alert('预览 " + o.slip + "');return false\">水单</a>");
  if (o.contract) files.push("<a class=\"ly-link\" href=\"#\" onclick=\"alert('预览 " + o.contract + "');return false\">合同</a>");
  return files.length ? files.join('<span class="link-muted"> / </span>') : '—';
}
function attachmentChip(fileName, label) {
  if (!fileName) return '<span class="attachment-empty">' + label + '：未上传</span>';
  return "<a class=\"attachment-chip\" href=\"#\" onclick=\"alert('预览 " + fileName + "');return false\">" +
    '<span class="file-icon"></span><span>' + label + '：' + fileName + '</span></a>';
}
function moneyText(amount) {
  return amount === 0 ? '¥0' : '¥' + Number(amount || 0).toLocaleString();
}
function itemPriceText(it) {
  if (!it.price) return '¥0';
  return moneyText(it.price) + (it.unit ? '/' + it.unit : '');
}
function itemQtyText(it) {
  if (it.unit === '年' && Number(it.qty || 1) === 1) return '—';
  return it.qty || 1;
}
function orderItemName(it) {
  return it.name + (it.qty > 1 ? ' ×' + it.qty : '');
}
function orderContentSummary(o) {
  var items = o.items || [];
  if (items.length === 0) return '—';
  var first = orderItemName(items[0]);
  if (items.length === 1) return first;
  var all = items.map(orderItemName).join('<br>');
  return first + '<span class="item-count">共 ' + items.length + ' 项<span class="order-items-popover">' + all + '</span></span>';
}
function itemResultText(it) {
  if (it.result) return it.result;
  if (it.unit === '年') return '生成或延长主套餐权益与系统授权';
  if (it.unit === '包') return '按购买数量增加对应权益额度';
  if (it.unit === '次') return '生成服务记录';
  return '开通服务权限或生成消耗记录';
}

/* ===== 行内操作（按状态动态显示） ===== */
function buildOps(o, idx) {
  var btns = ['<a class="ly-link" href="#" onclick="openDrawer(' + idx + ');return false">详情</a>'];
  if (o.exception) btns.unshift('<a class="ly-link" href="#" onclick="retryException(' + idx + ');return false">' + retryText(o.exception) + '</a>');
  if (o.status !== '已作废') btns.push('<a class="ly-link" href="#" onclick="voidOrder(' + idx + ');return false" style="color:#ff4d4f">作废</a>');
  return btns.join(' · ');
}

    '<div class="item"><span class="label">创建时间</span><span class="value">' + o.createdAt + '</span></div>' +
    '</div></section>';
  html += '<section class="order-detail-section"><h4>订单项</h4><table class="order-detail-table"><thead><tr><th>商品</th><th>购买周期</th><th class="num">数量</th><th class="num">成交金额</th></tr></thead><tbody>';
  o.items.forEach(function (it) {
    html += '<tr><td>' + it.name + '</td><td>' + (it.period || o.period || '—') + '</td><td class="num">' + itemQtyText(it) + '</td><td class="num">' + moneyText(it.subtotal || 0) + '</td></tr>';
  });
  html += '</tbody><tfoot><tr><td colspan="3" class="num">小计</td><td class="num">' + moneyText(o.amount) + '</td></tr></tfoot></table></section>';
  html += '<section class="order-detail-section"><h4>附件</h4><div class="attachment-list">' +
    attachmentChip(o.slip, '银行水单') +
    attachmentChip(o.contract, '合同/补充材料') +

  document.getElementById('dActions').innerHTML = acts;
  document.getElementById('dActions').style.display = acts ? 'flex' : 'none';

  document.getElementById('drawerMask').classList.add('open');
}

  document.getElementById('dActions').style.display = 'flex';
  document.getElementById('drawerMask').classList.add('open');
  createOrderItems = [{ product: getFirstAllowedProduct('新购'), qty: 1, amount: null, amountTouched: false }];
  syncCreatePeriod();
  syncCreateOrderType();
}

var CREATE_PRODUCTS = {
  erpFlagship: { name: 'ERP 旗舰版', type: 'package', level: 3, price: 69800, unit: '年', result: '生成或延长主套餐权益与系统授权' },
  erpPro: { name: 'ERP 专业版', type: 'package', level: 2, price: 29800, unit: '年', result: '生成或延长主套餐权益与系统授权' },
  scmEnt: { name: 'SCM 企业版', type: 'package', level: 2, price: 48000, unit: '年', result: '生成或延长主套餐权益与系统授权' },
  orderPack: { name: '订单扩容包', type: 'addon', price: 1000, unit: '包', result: '增加订单量权益额度' },
  mskuPack: { name: 'MSKU 扩容包', type: 'addon', price: 2000, unit: '包', result: '增加 MSKU 权益额度' },
  traceMeter: { name: '物流轨迹查询', type: 'meteredFixed', price: 0.1, unit: '物流单', defaultAmount: 5000, result: '开通服务权限；按业务系统实际上报物流单累计计费' },
  kdcs: { name: '金蝶云星空对接', type: 'service', price: 20000, unit: '次' }
};
var createOrderItems = [];
var createUploads = { slip: false, contract: false };
var CREATE_TENANT_STATE = {
  hasMain: true,
  trialUsed: true,
  currentMainProduct: 'erpPro',
  currentMainName: 'ERP 专业版',
  currentMainEnd: '2026-12-31',
  currentLevel: 2
};
var CREATE_CYCLES = {
  '15d': { label: '15天', amountFactor: 15 / 365 },
  '1m': { label: '1个月', amountFactor: 1 / 12 },
  '3m': { label: '3个月', amountFactor: 1 / 4 },
  '1y': { label: '1年', amountFactor: 1 },
  '2y': { label: '2年', amountFactor: 2 },
  '3y': { label: '3年', amountFactor: 3 },
  custom: { label: '自定义', amountFactor: 1 }
};
function addCreatePeriod(start, cycle) {
  var end = new Date(start.getTime());
  if (cycle === '15d') end.setDate(end.getDate() + 15);
  if (cycle === '1m') end.setMonth(end.getMonth() + 1);
  if (cycle === '3m') end.setMonth(end.getMonth() + 3);
  if (cycle === '1y') end.setFullYear(end.getFullYear() + 1);
  if (cycle === '2y') end.setFullYear(end.getFullYear() + 2);
  if (cycle === '3y') end.setFullYear(end.getFullYear() + 3);
  end.setDate(end.getDate() - 1);
  return end;
}
function formatCreateDate(date) {
  function p(n) { return n < 10 ? '0' + n : n; }
  return date.getFullYear() + '-' + p(date.getMonth() + 1) + '-' + p(date.getDate());
}
function formatCreateMoney(amount) {
  return '¥' + Math.round(amount).toLocaleString();
}
function formatCreateUnitPrice(amount) {
  if (amount > 0 && amount < 1) return '¥' + amount;
  return formatCreateMoney(amount);
}
function markCreateCustomPeriod() {
  var cycle = document.getElementById('createCycle');
  if (cycle && cycle.value !== 'custom') {
    cycle.value = 'custom';
    syncCreateProduct();
  }
}
function syncCreatePeriod() {
  var cycle = document.getElementById('createCycle');
  var start = document.getElementById('createStart');
  var end = document.getElementById('createEnd');
  if (!cycle || !start || !end) return;
  if (cycle.value !== 'custom' && start.value) {
    end.value = formatCreateDate(addCreatePeriod(new Date(start.value + 'T00:00:00'), cycle.value));
  }
  syncCreateProduct();
}
function getCreatePeriodFactor() {
  var cycleEl = document.getElementById('createCycle');
  var startEl = document.getElementById('createStart');
  var endEl = document.getElementById('createEnd');
  if (!cycleEl) return 1;
  if (cycleEl.value !== 'custom') return (CREATE_CYCLES[cycleEl.value] || CREATE_CYCLES['1y']).amountFactor;
  if (!startEl || !endEl || !startEl.value || !endEl.value) return 1;
  var start = new Date(startEl.value + 'T00:00:00');
  var end = new Date(endEl.value + 'T00:00:00');
  var days = Math.max(Math.round((end - start) / 86400000) + 1, 1);
  return days / 365;
}
function syncCreateOrderType() {
  var typeEl = document.getElementById('createOrderType');
  var cycleEl = document.getElementById('createCycle');
  var startEl = document.getElementById('createStart');
  var endEl = document.getElementById('createEnd');
  if (!typeEl || !cycleEl || !startEl || !endEl) return;
  var orderType = typeEl.value;
  if (orderType === '试用') cycleEl.value = '15d';
  if (orderType === '购买增值服务') cycleEl.value = 'custom';
  cycleEl.disabled = orderType === '试用';
  startEl.disabled = orderType === '续费';
  endEl.disabled = orderType === '试用' || orderType === '续费' || (orderType !== '购买增值服务' && cycleEl.value !== 'custom');
  if (orderType === '续费') {
    startEl.value = nextCreateDate(CREATE_TENANT_STATE.currentMainEnd);
  }
  createOrderItems = createOrderItems.map(function(item) {
    if (isProductAllowed(item.product, orderType)) return item;
    return { product: getFirstAllowedProduct(orderType), qty: 1, amount: null, amountTouched: false };
  });
  updateCreateRuleTip();
  syncCreatePeriod();
}
function nextCreateDate(dateText) {
  var d = new Date(dateText + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  return formatCreateDate(d);
}
function isProductAllowed(productKey, orderType) {
  var p = CREATE_PRODUCTS[productKey];
  if (!p) return false;
  if (orderType === '新购' || orderType === '试用') return p.type === 'package';
  if (orderType === '续费') return productKey === CREATE_TENANT_STATE.currentMainProduct;
  if (orderType === '升级') return p.type === 'package' && Number(p.level || 0) > CREATE_TENANT_STATE.currentLevel;
  if (orderType === '购买增值服务') return p.type !== 'package';
  return false;
}
function getFirstAllowedProduct(orderType) {
  var keys = Object.keys(CREATE_PRODUCTS);
  for (var i = 0; i < keys.length; i++) {
    if (isProductAllowed(keys[i], orderType)) return keys[i];
  }
  return keys[0];
}
function getCreateOrderType() {
  var el = document.getElementById('createOrderType');
  return el ? el.value : '新购';
}
function updateCreateRuleTip() {
  var tip = document.getElementById('createRuleTip');
  if (!tip) return;
  var orderType = getCreateOrderType();
  var rules = {
    '新购': '仅可选择主套餐。租户已有有效主套餐时不可创建新购订单；保存后开通对应系统并生成套餐权益。',
    '试用': '仅可选择主套餐，购买周期固定 15 天，成交金额可为 0。已有有效主套餐或已试用过时不可创建。',
    '续费': '仅可选择当前主套餐。生效时间自动取当前套餐到期日次日，到期时间按购买周期自动计算。',
    '升级': '仅可选择高于当前套餐等级的主套餐。保存后按新套餐重新生成有效期内权益。',
    '购买增值服务': '仅可选择增值服务。额度类服务按数量增加权益；一次性交付生成服务记录；按量/固定单价服务开通权限后按业务上报计费。'
  };
  tip.innerHTML = '<strong>' + orderType + '规则：</strong>' + rules[orderType];
}
function markCreateUpload(type) {
  createUploads[type] = true;
  var id = type === 'slip' ? 'createSlipChip' : 'createContractChip';
  var label = type === 'slip' ? '银行水单' : '合同附件';
  var el = document.getElementById(id);
  if (el) {
    el.classList.add('uploaded');
    el.innerHTML = '<span class="file-icon"></span><span>' + label + '：已上传</span>';
  }
  syncCreateProduct();
}
function syncCreateProduct() {
  var cycleEl = document.getElementById('createCycle');
  if (!cycleEl || !document.getElementById('createItemsBody')) return;
  var orderType = getCreateOrderType();
  var endEl = document.getElementById('createEnd');
  if (endEl) endEl.disabled = orderType === '试用' || orderType === '续费' || (orderType !== '购买增值服务' && cycleEl.value !== 'custom');
  updateCreateRuleTip();
  renderCreateItems();
}
function productOptions(selected) {
  var orderType = getCreateOrderType();
  return Object.keys(CREATE_PRODUCTS).filter(function(key) {
    return isProductAllowed(key, orderType);
  }).map(function(key) {
    var p = CREATE_PRODUCTS[key];
    return '<option value="' + key + '"' + (key === selected ? ' selected' : '') + '>' + p.name + '</option>';
  }).join('');
}
function defaultCreateAmount(productKey, qty) {
  var product = CREATE_PRODUCTS[productKey];
  var orderTypeEl = document.getElementById('createOrderType');
  if (orderTypeEl && orderTypeEl.value === '试用') return 0;
  if (product.type === 'metered') return 10000;
  if (product.type === 'meteredFixed') return product.defaultAmount || 0;
  if (product.type === 'package') return product.price * getCreatePeriodFactor();
  return product.price * Math.max(Number(qty || 1), 1);
}
function parseCreateMoney(value) {
  return Number(String(value || '').replace(/[^\d.]/g, '')) || 0;
}
function updateCreateItem(index, field, value) {
  var item = createOrderItems[index];
  if (!item) return;
  if (field === 'product') {
    item.product = value;
    item.qty = 1;
    item.amountTouched = false;
    item.amount = null;
  }
  if (field === 'qty') {
    item.qty = Math.max(parseInt(value || '1', 10), 1);
    item.amountTouched = false;
    item.amount = null;
  }
  if (field === 'amount') {
    item.amount = parseCreateMoney(value);
    item.amountTouched = true;
  }
  renderCreateItems();
}
function addCreateItem() {
  createOrderItems.push({ product: getFirstAllowedProduct(getCreateOrderType()), qty: 1, amount: null, amountTouched: false });
  renderCreateItems();
}
function removeCreateItem(index) {
  if (createOrderItems.length <= 1) return;
  createOrderItems.splice(index, 1);
  renderCreateItems();
}
function renderCreateItems() {
  var body = document.getElementById('createItemsBody');
  if (!body) return;
  var orderType = getCreateOrderType();
  var cycle = CREATE_CYCLES[(document.getElementById('createCycle') || {}).value] || CREATE_CYCLES.custom;
  var total = 0;
  var resultLabels = [];
  body.innerHTML = '';
  createOrderItems.forEach(function(item, index) {
    if (!isProductAllowed(item.product, orderType)) {
      item.product = getFirstAllowedProduct(orderType);
      item.qty = 1;
      item.amount = null;
      item.amountTouched = false;
    }
    var product = CREATE_PRODUCTS[item.product] || CREATE_PRODUCTS[getFirstAllowedProduct(orderType)];
    var qtyHidden = product.type === 'package' || product.type === 'metered' || product.type === 'meteredFixed';
    var amount = item.amountTouched ? Number(item.amount || 0) : defaultCreateAmount(item.product, item.qty);
    total += amount;
    var result = createResultText(orderType, product);
    if (resultLabels.indexOf(result) === -1) resultLabels.push(result);
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><select class="create-control" onchange="updateCreateItem(' + index + ', &quot;product&quot;, this.value)">' + productOptions(item.product) + '</select></td>' +
      '<td><span class="create-period-pill">' + createPeriodLabel(orderType, cycle) + '</span></td>' +
      '<td class="num">' + (qtyHidden ? '—' : '<input class="create-control" type="number" min="1" value="' + (item.qty || 1) + '" onchange="updateCreateItem(' + index + ', &quot;qty&quot;, this.value)" style="width:76px;display:inline-block;text-align:right">') + '</td>' +
      '<td class="num"><input class="create-control money" value="' + formatCreateMoney(amount) + '" onchange="updateCreateItem(' + index + ', &quot;amount&quot;, this.value)" style="width:120px;display:inline-block"></td>' +
      '<td class="row-action">' + (createOrderItems.length > 1 ? '<a class="ly-link" href="#" onclick="removeCreateItem(' + index + ');return false" style="color:#ff4d4f">删除</a>' : '—') + '</td>';
    body.appendChild(tr);
  });
  document.getElementById('createTotalAmount').textContent = formatCreateMoney(total);
  var resultEl = document.getElementById('createOpenResult');
  if (resultEl) resultEl.textContent = resultLabels.join('；');
}
function createPeriodLabel(orderType, cycle) {
  if (orderType === '购买增值服务') return '按订单填写';
  if (orderType === '试用') return '15天';
  return cycle.label;
}
function createResultText(orderType, product) {
  if (orderType === '新购') return '开通主套餐，生成套餐权益和系统授权';
  if (orderType === '试用') return '开通试用套餐，15 天后自动失效';
  if (orderType === '续费') return '延长当前套餐有效期，生成新周期权益';
  if (orderType === '升级') return '切换为新套餐，按新套餐重新生成权益';
  if (product.type === 'addon') return product.result || '按购买数量增加对应权益额度';
  if (product.type === 'service') return product.result || '生成服务记录';
  if (product.type === 'meteredFixed') return product.result || '开通服务权限，后续按业务上报计费';
  return product.result || '按订单项处理';
}
function submitCreateOrder() {
  var orderType = getCreateOrderType();
  var total = parseCreateMoney(document.getElementById('createTotalAmount').textContent);
  if (orderType === '新购' && CREATE_TENANT_STATE.hasMain) {
    alert('当前租户已存在有效主套餐，不能创建新购订单。');
    return;
  }
  if (orderType === '试用' && (CREATE_TENANT_STATE.hasMain || CREATE_TENANT_STATE.trialUsed)) {
    alert('当前租户已有有效主套餐或已使用过试用，不能创建试用订单。');
    return;
  }
  if ((orderType === '续费' || orderType === '购买增值服务') && !CREATE_TENANT_STATE.hasMain) {
    alert('当前租户没有有效主套餐，不能创建' + orderType + '订单。');
    return;
  }
  var invalidProduct = createOrderItems.some(function(item) {
    return !isProductAllowed(item.product, orderType);
  });
  if (invalidProduct) {
    alert('订单项商品不符合当前订单类型，请重新选择。');
    return;
  }
  if (orderType !== '试用' && total <= 0) {
    alert('成交金额必须大于 0。');
    return;
  }
  if (!createUploads.contract) {
    alert('请先上传合同附件。');
    return;
  }
  if (orderType !== '试用' && !createUploads.slip) {
    alert('请先上传银行水单。');
    return;
  }
  alert('原型校验通过，可保存并开通。');
  closeDrawer();
}

/* ===== 行内操作（一期：直接生效，不走二次审批） ===== */
function uploadSlip(idx, fromDrawer) {
  if (confirm('原型占位：选择并上传 ' + ORDERS[idx].code + ' 的水单？')) {
    ORDERS[idx].slip = ORDERS[idx].code + '-水单.pdf';
    ORDERS[idx].log.push({ t: nowStr(), who: '胡仕玲', action: '上传水单' });
    render();
    if (fromDrawer) openDrawer(idx);
  }
}
function approve(idx, fromDrawer) {
  if (confirm('确认开通 ' + ORDERS[idx].code + '？\n\n• 按订单项生成权益 / 系统开通 / 服务记录\n• 全部成功后汇总权益池并同步业务系统\n• 状态：草稿 → 已开通')) {
    ORDERS[idx].status = '已开通';
    ORDERS[idx].openedAt = nowStr();
    ORDERS[idx].openedBy = '胡仕玲';
    ORDERS[idx].log.push({ t: nowStr(), who: '胡仕玲', action: '审核开通' });
    render();
    if (fromDrawer) openDrawer(idx);
  }
}
function voidOrder(idx, fromDrawer) {
  if (confirm('确认作废 ' + ORDERS[idx].code + '？\n\n作废后回收本订单所有订单项贡献的权益和系统开通记录；历史消耗保留。')) {
    ORDERS[idx].status = '已作废';
    ORDERS[idx].log.push({ t: nowStr(), who: '胡仕玲', action: '作废订单' });
    render();
    if (fromDrawer) closeDrawer();
  }
}
function refund(idx, fromDrawer) {
  if (confirm('确认退款并作废 ' + ORDERS[idx].code + '？\n\n• 回收本订单所有订单项贡献的权益与菜单授权\n• 状态：' + ORDERS[idx].status + ' → 已作废')) {
    ORDERS[idx].status = '已作废';
    ORDERS[idx].log.push({ t: nowStr(), who: '胡仕玲', action: '订单作废（退款处理，权益已回收）' });
    render();
    if (fromDrawer) openDrawer(idx);
  }
}
function retryException(idx, fromDrawer) {
  var order = ORDERS[idx];
  var action = retryText(order.exception);
  if (confirm('确认' + action + ' ' + order.code + '？\n\nMVP 原型：从失败环节继续处理，成功后清除异常标记。')) {
    order.log.push({ t: nowStr(), who: '胡仕玲', action: action + '成功，清除' + order.exception });
    order.exception = null;
    if (order.status === '草稿') {
      order.status = '已开通';
      order.openedAt = nowStr();
      order.openedBy = '胡仕玲';
    }
    render();
    if (fromDrawer) openDrawer(idx);
  }
}
function nowStr() {
  var d = new Date();
  function p(n) { return n < 10 ? '0' + n : n; }
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

render();
var urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('create') === '1') {
  openCreate();
} else if (urlParams.get('order')) {
  var targetOrder = urlParams.get('order');
  var targetIndex = ORDERS.findIndex(function (o) { return o.code === targetOrder; });
  if (targetIndex >= 0) openDrawer(targetIndex);
}
</script>
