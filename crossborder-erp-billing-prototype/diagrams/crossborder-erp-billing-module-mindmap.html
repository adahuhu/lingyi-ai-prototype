<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>计费模块脑图</title>
  <style>
    :root {
      --bg: #e2e8f0;
      --panel: #f8fafc;
      --text: #0f172a;
      --line: #94a3b8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: radial-gradient(circle at top, #f8fafc 0%, #e2e8f0 100%); color: var(--text); font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif; }
    .wrap { min-height: 100vh; padding: 24px; }
    .panel { background: rgba(248,250,252,0.82); border: 1px solid rgba(148,163,184,0.35); border-radius: 24px; overflow: auto; box-shadow: 0 20px 60px rgba(15,23,42,0.10); }
    img { display: block; width: 1393px; max-width: none; height: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <img src="crossborder-erp-billing-module-mindmap.svg" alt="计费模块脑图" />
    </div>
  </div>
</body>
</html>
